<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/aura_agent_icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#4648d4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Aura Agent</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#00732c",
                        "surface-container-high": "#dee8ff",
                        "surface-tint": "#494bd6",
                        "tertiary-container": "#727577",
                        "surface-dim": "#cfdaf2",
                        "primary": "#4648d4",
                        "surface-bright": "#f9f9ff",
                        "outline-variant": "#c7c4d7",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#07006c",
                        "on-primary": "#ffffff",
                        "on-secondary-fixed-variant": "#00531e",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#c4c7c9",
                        "tertiary": "#595c5e",
                        "on-tertiary-container": "#fbfdff",
                        "outline": "#767586",
                        "surface-container-highest": "#d8e3fb",
                        "surface-variant": "#d8e3fb",
                        "on-secondary-fixed": "#002108",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "secondary-container": "#5cfd80",
                        "tertiary-fixed": "#e0e3e5",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-surface": "#111c2d",
                        "background": "#f9f9ff",
                        "surface": "#f9f9ff",
                        "surface-container": "#e7eeff",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#6063ee",
                        "on-error-container": "#93000a",
                        "on-primary-container": "#fffbff",
                        "error-container": "#ffdad6",
                        "on-background": "#111c2d",
                        "secondary-fixed-dim": "#3ce36a",
                        "on-tertiary-fixed-variant": "#444749",
                        "inverse-on-surface": "#ecf1ff",
                        "on-error": "#ffffff",
                        "secondary": "#006e2a",
                        "primary-fixed": "#e1e0ff",
                        "surface-container-low": "#f0f3ff",
                        "inverse-surface": "#263143",
                        "secondary-fixed": "#69ff87",
                        "on-tertiary-fixed": "#191c1e",
                        "on-surface-variant": "#464554",
                        "inverse-primary": "#c0c1ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "8px",
                        "margin": "24px",
                        "sm": "16px",
                        "md": "24px",
                        "xl": "48px",
                        "gutter": "20px",
                        "base": "4px",
                        "lg": "32px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-caps": ["Inter"],
                        "title-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "title-sm": ["18px", {"lineHeight": "1.4", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid #E2E8F0;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: 100dvh;
            background:
                radial-gradient(circle at top, rgba(96, 165, 250, 0.16), transparent 30%),
                linear-gradient(180deg, #f9f9ff 0%, #eef3ff 100%);
        }
        /* Custom hide classes for logic */
        .hidden-screen { display: none !important; }
    </style>
  </head>
  <body class="bg-background font-body-md text-on-background flex min-h-dvh flex-col">
    
    <header id="top-bar" class="fixed inset-x-0 top-0 z-50 w-full border-b border-outline-variant/30 bg-white/80 px-4 pt-[calc(0.85rem+env(safe-area-inset-top))] pb-4 shadow-[0_10px_30px_rgba(70,72,212,0.08)] backdrop-blur-xl sm:px-6">
      <div class="mx-auto flex w-full max-w-[1200px] items-center justify-between gap-4">
        <span id="account-avatar" class="flex h-14 w-14 shrink-0 items-center justify-center rounded-full border border-primary/15 bg-primary/10 text-primary">
          <span class="material-symbols-outlined text-[30px]" style="font-variation-settings: 'FILL' 1;">person</span>
        </span>
        <div class="flex items-center gap-2 sm:gap-3">
          <div class="hidden md:flex gap-6 mr-2" id="desktop-nav">
            <!-- Nav generated by JS -->
          </div>
          <button id="notifications-button" type="button" class="relative flex h-11 w-11 items-center justify-center rounded-full border border-outline-variant/50 bg-surface text-on-surface transition hover:border-primary/30 hover:text-primary disabled:cursor-default disabled:opacity-60" disabled title="Notifications">
            <span class="material-symbols-outlined text-[22px]">notifications</span>
            <span id="notifications-badge" class="hidden absolute -right-1 -top-1 min-w-[20px] rounded-full bg-rose-500 px-1.5 py-[2px] text-center text-[11px] font-bold leading-none text-white shadow-[0_6px_16px_rgba(244,63,94,0.35)]">0</span>
          </button>
          <button id="account-logout-btn" type="button" class="flex h-11 items-center justify-center gap-2 rounded-full border border-outline-variant/50 bg-surface px-4 text-body-sm font-medium text-on-surface transition hover:border-error/30 hover:text-error disabled:cursor-default disabled:opacity-60" disabled>
            <span class="material-symbols-outlined text-[18px]">logout</span>
            <span class="hidden sm:inline">Logout</span>
          </button>
        </div>
      </div>
    </header>

    <div id="app" class="w-full flex-1">
      <main id="app-content" class="mx-auto flex w-full max-w-[1200px] flex-col gap-lg px-4 pt-[calc(var(--top-bar-height)+1.25rem)] pb-[calc(var(--bottom-nav-height)+1.25rem)] sm:px-6 lg:px-margin">
        <!-- Screens will be loaded here -->
      </main>
      
      <nav id="bottom-nav" class="mobile-bottom-nav md:hidden fixed inset-x-0 bottom-0 z-50 flex items-start justify-around rounded-t-[1.25rem] border-t border-white/10 bg-[#121212]/90 px-4 shadow-[0_-8px_32px_rgba(0,0,0,0.5)] backdrop-blur-2xl">
        <!-- Navigation will be generated by JS -->
      </nav>
    </div>

    <div id="offline-banner" class="hidden fixed inset-x-4 top-[calc(86px+env(safe-area-inset-top))] z-[70] mx-auto max-w-[720px] rounded-xl border border-error/20 bg-error-container px-4 py-3 text-on-error-container shadow-lg">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-[20px]">wifi_off</span>
        <p class="text-body-sm font-medium">Anda sedang offline. Data klaim akan diperbarui setelah koneksi kembali.</p>
      </div>
    </div>

    <div id="logout-modal" class="hidden fixed inset-0 z-[80] flex items-center justify-center bg-[#111c2d]/45 px-4 backdrop-blur-sm">
      <div class="w-full max-w-sm rounded-2xl border border-outline-variant/40 bg-white p-5 shadow-2xl">
        <div class="flex items-start gap-3">
          <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full bg-error-container text-error">
            <span class="material-symbols-outlined text-[22px]">logout</span>
          </div>
          <div class="min-w-0">
            <h3 class="text-title-sm text-on-surface">Logout now?</h3>
            <p class="mt-1 text-body-sm text-on-surface-variant">You will need to sign in again to access your claims and notifications.</p>
          </div>
        </div>
        <div class="mt-5 flex gap-3">
          <button id="logout-cancel-btn" type="button" class="flex-1 rounded-xl border border-outline-variant/60 bg-surface px-4 py-3 text-body-sm font-medium text-on-surface transition hover:border-outline">
            Cancel
          </button>
          <button id="logout-confirm-btn" type="button" class="flex-1 rounded-xl bg-error px-4 py-3 text-body-sm font-medium text-white transition hover:opacity-90">
            Logout
          </button>
        </div>
      </div>
    </div>
    <script src="/runtime-config.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
